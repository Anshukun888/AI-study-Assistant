{% extends "base.html" %}
{% block title %}Join {{ group.name }}{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body text-center p-4">
                    <i class="bi bi-people-fill display-4 text-primary"></i>
                    <h4 class="mt-3">Join {{ group.name }}?</h4>
                    <p class="text-muted">You'll be able to chat, share documents, and use the AI assistant with the group.</p>
                    <form method="post" action="/groups/{{ group.id }}/join" class="mt-3">
                        <button type="submit" class="btn btn-primary btn-lg"><i class="bi bi-box-arrow-in-right me-2"></i>Join Group</button>
                    </form>
                    <a href="/groups/page/list" class="btn btn-link mt-2">Back to Groups</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
